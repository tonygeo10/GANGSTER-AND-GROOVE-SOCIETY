  <script>
    const defaultConfig = {
      logo_text: 'GNG Society',
      music_label: 'Music',
      games_label: 'Games',
      cinema_label: 'Cinema',
      street_label: 'Street Stories',
      background_color: '#000000',
      surface_color: '#111111',
      text_color: '#e0e0e0',
      primary_action: '#ff7828',
      secondary_action: '#a0a0a0',
      font_family: 'Outfit',
      font_size: 14
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      document.body.style.background = c.background_color;
      document.getElementById('navbar').style.background = c.background_color;
      document.getElementById('navbar').style.borderColor = c.surface_color;
      const fallback = document.getElementById('logo-text-fallback');
      if (fallback) fallback.style.color = c.text_color;
      
      // Update category labels
      document.getElementById('music-label').textContent = c.music_label;
      document.getElementById('games-label').textContent = c.games_label;
      document.getElementById('cinema-label').textContent = c.cinema_label;
      document.getElementById('street-label').textContent = c.street_label;
      document.getElementById('mobile-music-label').textContent = c.music_label;
      document.getElementById('mobile-games-label').textContent = c.games_label;
      document.getElementById('mobile-cinema-label').textContent = c.cinema_label;
      document.getElementById('mobile-street-label').textContent = c.street_label;
      
      document.querySelectorAll('.dropdown-panel').forEach(p => {
        p.style.background = c.surface_color;
        p.style.borderColor = c.surface_color;
      });
    }

    // Mobile menu
    document.getElementById('mobile-toggle').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.add('open');
      document.getElementById('mobile-overlay').classList.remove('hidden');
      document.getElementById('mobile-toggle').classList.add('open');
    });
    function closeMobile() {
      document.getElementById('mobile-menu').classList.remove('open');
      document.getElementById('mobile-overlay').classList.add('hidden');
      document.getElementById('mobile-toggle').classList.remove('open');
    }
    document.getElementById('mobile-close').addEventListener('click', closeMobile);
    document.getElementById('mobile-overlay').addEventListener('click', closeMobile);

    document.querySelectorAll('.mobile-section').forEach(btn => {
      btn.addEventListener('click', () => {
        const section = btn.dataset.section;
        const sub = document.getElementById('sub-' + section);
        sub.classList.toggle('open');
      });
    });

    // Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => applyConfig(config),
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
          { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['logo_text', config.logo_text || defaultConfig.logo_text],
        ['music_label', config.music_label || defaultConfig.music_label],
        ['games_label', config.games_label || defaultConfig.games_label],
        ['cinema_label', config.cinema_label || defaultConfig.cinema_label],
        ['street_label', config.street_label || defaultConfig.street_label]
      ])
    });

    applyConfig(defaultConfig);
    lucide.createIcons();
  </script>
